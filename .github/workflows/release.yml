name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to package, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Build block assets
        run: npm run build

      - name: Package plugin
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          plugin_slug="wpclaw"
          tag_name="${TAG_NAME}"
          zip_name="${plugin_slug}-${tag_name}.zip"

          rm -rf dist
          mkdir -p "dist/${plugin_slug}"

          rsync -a \
            wpclaw.php \
            uninstall.php \
            README.md \
            LICENSE \
            includes \
            languages \
            "dist/${plugin_slug}/"

          mkdir -p "dist/${plugin_slug}/blocks"
          rsync -a blocks/chat-react "dist/${plugin_slug}/blocks/"

          rm -rf "dist/${plugin_slug}/blocks/chat-react/src"
          rm -f "dist/${plugin_slug}/blocks/chat-react/view.scss"
          find "dist/${plugin_slug}" -name "*.map" -delete
          find "dist/${plugin_slug}" -type d -empty -delete

          ( cd dist && zip -r "${zip_name}" "${plugin_slug}" )

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" \
            "dist/wpclaw-${TAG_NAME}.zip" \
            --title "WPClaw ${TAG_NAME}" \
            --generate-notes \
            --verify-tag
